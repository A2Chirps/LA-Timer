<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Streamer U Countdown Controller</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a0e02;
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 24px; color: #f5e6b8; padding: 24px;
  }
  .title { font-size: 13px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: #d4af37; }

  .preview {
    position: relative;
    width: 280px;
    height: 160px;
    border-radius: 16px;
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  .preview img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .preview-content {
    position: relative; z-index: 1; width: 100%; height: 100%;
    background: rgba(0,0,0,0.55); padding: 10px;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
  }
  .preview-caption { color: #d4af37; font-size: 10px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; white-space: nowrap; }
  .preview-time { color: #f5e6b8; font-size: 38px; font-weight: 900; line-height: 1; letter-spacing: 1px; font-family: monospace; }

  .panel {
    background: #2a1804;
    border: 1.5px solid #d4af3744;
    border-radius: 14px;
    padding: 20px 28px;
    display: flex; flex-direction: column; gap: 14px; align-items: center;
    width: 280px;
  }
  .panel label { font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: #d4af37; align-self: flex-start; }
  .panel input {
    background: #1a0e02; border: 1.5px solid #d4af3766; color: #f5e6b8;
    border-radius: 8px; padding: 10px 12px; font-size: 14px; font-family: inherit;
    width: 100%;
  }
  .panel input:focus { outline: none; border-color: #d4af37; }

  .row { display: flex; gap: 10px; width: 100%; }
  .quick-btn {
    flex: 1; background: #3b2604; border: 1.5px solid #d4af3766; color: #d4af37;
    padding: 9px 0; border-radius: 8px; font-size: 12px; font-weight: 600;
    font-family: inherit; cursor: pointer; transition: all 0.15s;
  }
  .quick-btn:hover { background: #4a3008; border-color: #d4af37; }

  .save-btn {
    background: #d4af37; border: none; color: #6d0f1f;
    padding: 12px 0; border-radius: 10px; font-size: 14px; font-weight: 800;
    font-family: inherit; cursor: pointer; letter-spacing: 1px; width: 100%;
    transition: all 0.15s;
  }
  .save-btn:hover { background: #e8c456; }
  .save-btn:active { transform: scale(0.97); }

  .status { font-size: 11px; color: #d4af3766; letter-spacing: 1px; }
</style>
</head>

<div class="panel">
  <label>Target date &amp; time</label>
  <input type="datetime-local" id="dtInput">
  <div class="row">
    <button class="quick-btn" id="todayBtn">Today 1PM LA</button>
    <button class="quick-btn" id="tomorrowBtn">Tomorrow 1PM LA</button>
  </div>
  <button class="save-btn" id="saveBtn">Set Countdown</button>
</div>

<div class="status" id="status">Connecting...</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBsjUq6mvCwKGr9n64Oo7pGft8NqGcUIaU",
    authDomain: "website-firebase-17385.firebaseapp.com",
    databaseURL: "https://website-firebase-17385-default-rtdb.firebaseio.com",
    projectId: "website-firebase-17385",
    storageBucket: "website-firebase-17385.firebasestorage.app",
    messagingSenderId: "934443626587",
    appId: "1:934443626587:web:12d642d7d1fb4d7cc1cf7e"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const countdownRef = ref(db, 'countdown');

  let targetMs = null;
  let interval = null;

  function pad(n) { return n < 10 ? '0' + n : '' + n; }

  function updatePreview() {
    const el = document.getElementById('previewTime');
    if (targetMs === null) { el.textContent = '--:--:--'; return; }
    const diff = targetMs - Date.now();
    if (diff <= 0) { el.textContent = 'OPEN NOW'; return; }
    const totalSeconds = Math.floor(diff / 1000);
    const days = Math.floor(totalSeconds / 86400);
    const hours = Math.floor((totalSeconds % 86400) / 3600);
    const minutes = Math.floor((totalSeconds % 3600) / 60);
    const seconds = totalSeconds % 60;
    el.textContent = days > 0
      ? days + 'd ' + pad(hours) + ':' + pad(minutes) + ':' + pad(seconds)
      : pad(hours) + ':' + pad(minutes) + ':' + pad(seconds);
  }

  function getLA1pmOn(dayOffset) {
    // Get current LA wall-clock time, add dayOffset days, set to 1pm
    const laNow = new Date(new Date().toLocaleString('en-US', { timeZone: 'America/Los_Angeles' }));
    laNow.setDate(laNow.getDate() + dayOffset);
    laNow.setHours(13, 0, 0, 0);

    // Convert that LA wall-clock time back to a real UTC timestamp.
    // Trick: find the offset between LA time and UTC at that moment.
    const utcGuess = new Date(laNow.toLocaleString('en-US', { timeZone: 'UTC' }));
    const laGuess  = new Date(laNow.toLocaleString('en-US', { timeZone: 'America/Los_Angeles' }));
    const offset = laGuess.getTime() - utcGuess.getTime();
    return laNow.getTime() - offset;
  }

  document.getElementById('todayBtn').onclick = () => {
    targetMs = getLA1pmOn(0);
    if (targetMs <= Date.now()) targetMs = getLA1pmOn(1);
    saveTarget();
  };
  document.getElementById('tomorrowBtn').onclick = () => {
    targetMs = getLA1pmOn(1);
    saveTarget();
  };

  document.getElementById('saveBtn').onclick = () => {
    const val = document.getElementById('dtInput').value;
    if (!val) return;
    targetMs = new Date(val).getTime();
    saveTarget();
  };

  function saveTarget() {
    set(countdownRef, { targetMs });
    document.getElementById('status').textContent = 'Saved ✓';
    setTimeout(() => document.getElementById('status').textContent = 'Live ✦', 1500);
    updatePreview();
  }

  onValue(countdownRef, (snapshot) => {
    const d = snapshot.val();
    if (d && d.targetMs) {
      targetMs = d.targetMs;
      const dt = new Date(targetMs);
      const localStr = new Date(dt.getTime() - dt.getTimezoneOffset() * 60000).toISOString().slice(0,16);
      document.getElementById('dtInput').value = localStr;
    }
    clearInterval(interval);
    updatePreview();
    interval = setInterval(updatePreview, 1000);
    document.getElementById('status').textContent = 'Live ✦';
  });
</script>
